<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Clear Cache - Gestión de Demanda</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .btn {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .info {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Limpiar Caché del Navegador</h1>
    <div class="info">
        <p>Si los cambios no se reflejan en CloudFront, puede ser debido a la caché del navegador.</p>
        <p>Haz clic en el botón para limpiar la caché y recargar la aplicación.</p>
    </div>
    
    <button class="btn" onclick="clearCacheAndReload()">Limpiar Caché y Recargar</button>
    <button class="btn" onclick="goToApp()">Ir a la Aplicación</button>

    <script>
        function clearCacheAndReload() {
            // Clear localStorage
            localStorage.clear();
            
            // Clear sessionStorage
            sessionStorage.clear();
            
            // Clear service worker cache if exists
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) {
                        registration.unregister();
                    }
                });
            }
            
            // Clear cache storage
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    for (let name of names) {
                        caches.delete(name);
                    }
                });
            }
            
            alert('Caché limpiada. La página se recargará con un timestamp para evitar caché.');
            
            // Reload with cache busting
            const timestamp = new Date().getTime();
            window.location.href = 'index-modular.html?v=' + timestamp;
        }
        
        function goToApp() {
            const timestamp = new Date().getTime();
            window.location.href = 'index-modular.html?v=' + timestamp;
        }
    </script>
</body>
</html>
